name: Deploy notion-to-youtube Lambda

on:
  push:
    branches: [main, feature/webapp]
    paths:
      - 'notion-to-youtube/**'
      - '.github/workflows/deploy_lambda.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Build
        working-directory: notion-to-youtube
        run: sam build

      - name: Deploy
        working-directory: notion-to-youtube
        run: |
          sam deploy \
            --stack-name notion-youtube-sync \
            --s3-bucket aws-sam-cli-managed-default-samclisourcebucket-h7hjf7rlxmjl \
            --s3-prefix notion-youtube-sync \
            --region ap-northeast-2 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              GistId=e6d7c030aaaa3c6098f6ef1787bfe4c3 \
              PlaylistId=PL6TgjrcGl62fCnYllJ8zyFLrCuv7bu3oM \
              AppPassword="${{ secrets.APP_PASSWORD }}" \
              GithubPat="${{ secrets.APP_GITHUB_PAT }}" \
              NotionToken="${{ secrets.NOTION_TOKEN }}"
