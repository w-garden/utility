name: Build update_pptx

on:
  workflow_dispatch:  # 수동으로 실행

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: update_pptx.exe
          - os: macos-latest
            artifact_name: update_pptx

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-pptx pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --console --name update_pptx update_pptx.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
