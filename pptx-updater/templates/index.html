<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1428; color: #fff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: #1a2040; border-radius: 16px;
      padding: 36px; width: 100%; max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #8898cc; margin-bottom: 6px; margin-top: 16px; }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%; background: #0f1428; border: 1px solid #2a3560;
      border-radius: 8px; color: #fff; padding: 10px 14px;
      font-size: 15px; outline: none;
    }
    input:focus { border-color: #5080e0; }
    .folder-row {
      display: flex; gap: 8px; align-items: center;
    }
    .folder-path {
      flex: 1; background: #0f1428; border: 1px solid #2a3560;
      border-radius: 8px; color: #8898cc; padding: 10px 14px;
      font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .folder-path.set { color: #fff; border-color: #2a6040; }
    .btn-small {
      background: #2a3560; color: #fff; border: none;
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-small:hover { background: #3a4880; }
    .image-count { font-size: 13px; color: #8898cc; margin-top: 6px; min-height: 18px; }
    .image-count.ok { color: #80e0a0; }
    .image-count.warn { color: #e0a080; }
    button.primary {
      width: 100%; background: #5080e0; color: #fff;
      border: none; border-radius: 8px; padding: 13px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s; margin-top: 20px;
    }
    button.primary:hover { background: #3a60c0; }
    button.primary:disabled { background: #2a3560; cursor: not-allowed; }
    .result {
      margin-top: 20px; padding: 16px; border-radius: 8px;
      font-size: 14px; line-height: 1.6; display: none;
    }
    .result.success { background: #1a3020; border: 1px solid #2a6040; }
    .result.error { background: #301a20; border: 1px solid #602a40; }
    .result a { color: #80b0ff; font-weight: 600; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-support { background: #301a20; border: 1px solid #602a40;
      border-radius: 8px; padding: 16px; font-size: 14px; line-height: 1.6; }

    .label-hint { color: #5080e0; font-size: 12px; font-weight: 400; margin-left: 4px; }

    .help {
      margin: 4px 0 8px;
      border-radius: 10px;
      overflow: hidden;
      background: #162038;
    }
    .help-toggle {
      width: 100%;
      background: #222b4a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s, border-radius 0.3s;
    }
    .help-toggle:hover, .help-toggle:active { background: #2b375c; }
    .help-toggle .chev {
      color: #5080e0;
      display: inline-block;
      transition: transform 0.3s ease;
      font-size: 12px;
    }
    .help.open .help-toggle { border-radius: 10px 10px 0 0; }
    .help.open .help-toggle .chev { transform: rotate(90deg); }
    .help-toggle .hint { margin-left: auto; color: #6f86c2; font-size: 12px; font-weight: 400; }

    .help-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s ease;
      padding: 0 16px;
    }
    .help.open .help-body { max-height: 600px; padding: 12px 16px 14px; }

    .help-item {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      font-size: 13px;
      line-height: 1.5;
      color: #d0d8f0;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .help.open .help-item { opacity: 1; transform: translateY(0); }
    .help.open .help-item:nth-child(1) { transition-delay: 0.05s; }
    .help.open .help-item:nth-child(2) { transition-delay: 0.10s; }
    .help.open .help-item:nth-child(3) { transition-delay: 0.15s; }
    .help.open .help-item:nth-child(4) { transition-delay: 0.20s; }
    .help.open .help-item:nth-child(5) { transition-delay: 0.25s; }
    .help.open .help-item:nth-child(6) { transition-delay: 0.30s; }
    .help.open .help-item:nth-child(7) { transition-delay: 0.35s; }
    .help.open .help-item:nth-child(8) { transition-delay: 0.40s; }
    .help.open .help-item:nth-child(9) { transition-delay: 0.45s; }

    .help-item .mark {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      font-weight: 700;
      color: #5080e0;
    }
    .help-item .mark.dim { color: #6f86c2; }
    .help-item code {
      background: #0f1428;
      color: #80b0ff;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Setlist</h1>

  <div class="help" id="helpPanel">
    <button class="help-toggle" type="button" onclick="toggleHelp()">
      <span class="chev">▸</span>
      <span>사용법</span>
      <span class="hint" id="helpHint">탭하세요</span>
    </button>
    <div class="help-body">
      <div class="help-item"><span class="mark">1</span><span>이미지 폴더에 <code>1.jpg</code>, <code>2.jpg</code> 순서로 악보 이미지 저장</span></div>
      <div class="help-item"><span class="mark">2</span><span>이미지 폴더(또는 파일들) 선택</span></div>
      <div class="help-item"><span class="mark">3</span><span>제목을 <code>YYYYMMDD 라벨</code> 형식으로 (예: <code>20260520 수요성령집회</code>)</span></div>
      <div class="help-item"><span class="mark">4</span><span>페이지 구성 입력 — 아래 예시 참고</span></div>
      <div class="help-item"><span class="mark dim">•</span><span><code>2</code> → 2장씩 모두 채움</span></div>
      <div class="help-item"><span class="mark dim">•</span><span><code>2,2,3</code> → 3슬라이드 (2장, 2장, 3장)</span></div>
      <div class="help-item"><span class="mark dim">•</span><span><code>2x3</code> → 2장씩 3슬라이드</span></div>
      <div class="help-item"><span class="mark">5</span><span>생성 클릭</span></div>
    </div>
  </div>

  <form id="mainForm" onsubmit="event.preventDefault(); generate();">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호 입력">

    <!-- PC: 폴더 선택 -->
    <div id="folderSection">
      <label>이미지 폴더</label>
      <div class="folder-row">
        <div class="folder-path" id="folderPath">폴더를 선택해주세요</div>
        <button class="btn-small" onclick="pickFolder()">폴더 선택</button>
      </div>
      <div class="image-count" id="imageCount"></div>
    </div>

    <!-- 모바일: 파일 직접 선택 -->
    <div id="fileSection" style="display:none">
      <label>이미지 파일 선택 (숫자 파일명: 1.jpg, 2.png …)</label>
      <input type="file" id="fileInput" multiple accept="image/*"
        style="background:#0f1428;border:1px solid #2a3560;border-radius:8px;color:#fff;padding:10px 14px;font-size:14px;width:100%">
      <div class="image-count" id="fileCount"></div>
    </div>

    <label>제목</label>
    <input type="text" id="title">

    <label>페이지 구성<span class="label-hint">(예: 2 / 2,2,3 / 2x3)</span></label>
    <input type="text" id="pattern" value="2" placeholder="2" autocomplete="off">

    <button type="submit" class="primary" id="generateBtn">생성</button>
    <div class="result" id="result"></div>
  </form>
</div>

<script>
  const DB_NAME = 'pptx-tool', STORE = 'handles';

  const hasDirectoryPicker = 'showDirectoryPicker' in window;

  // 모바일/미지원 브라우저 → 파일 직접 선택 UI로 전환
  if (!hasDirectoryPicker) {
    document.getElementById('folderSection').style.display = 'none';
    document.getElementById('fileSection').style.display = 'block';
  }

  // 다음 수요일 기본 제목
  function nextWednesday() {
    const d = new Date();
    const diff = (3 - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0,10).replace(/-/g,'');
  }
  document.getElementById('title').placeholder = nextWednesday() + ' 수요성령집회 콘티';

  // IndexedDB
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  }
  async function saveHandle(key, handle) {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(handle, key);
    return new Promise(res => tx.oncomplete = res);
  }
  async function loadHandle(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction(STORE).objectStore(STORE).get(key);
      req.onsuccess = e => res(e.target.result);
      req.onerror = rej;
    });
  }

  let folderHandle = null;

  async function loadSavedFolder() {
    try {
      const h = await loadHandle('imageFolder');
      if (!h) return;
      const perm = await h.queryPermission({ mode: 'read' });
      if (perm === 'granted') {
        folderHandle = h;
        await refreshFolderUI();
      }
    } catch(e) {}
  }

  async function pickFolder() {
    try {
      const h = await window.showDirectoryPicker({ mode: 'read' });
      folderHandle = h;
      await saveHandle('imageFolder', h);
      await refreshFolderUI();
    } catch(e) {
      if (e.name !== 'AbortError') console.error(e);
    }
  }

  function naturalSort(a, b) {
    return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
  }

  async function getNumberedImages(dirHandle) {
    const images = [];
    for await (const [name, handle] of dirHandle.entries()) {
      if (handle.kind !== 'file') continue;
      const ext = name.split('.').pop().toLowerCase();
      if (!['jpg','jpeg','png','gif','bmp'].includes(ext)) continue;
      images.push({ name, handle });
    }
    images.sort(naturalSort);
    return images;
  }

  async function refreshFolderUI() {
    if (!folderHandle) return;
    document.getElementById('folderPath').textContent = folderHandle.name;
    document.getElementById('folderPath').className = 'folder-path set';
    const images = await getNumberedImages(folderHandle);
    const el = document.getElementById('imageCount');
    if (images.length) {
      el.textContent = `${images.length}개 이미지 발견: ${images.map(i=>i.name).join(', ')}`;
      el.className = 'image-count ok';
    } else {
      el.textContent = '이미지 파일이 없습니다.';
      el.className = 'image-count warn';
    }
  }

  document.getElementById('fileInput')?.addEventListener('change', () => {
    const files = getSelectedFiles();
    const el = document.getElementById('fileCount');
    if (files.length) {
      el.textContent = `${files.length}개 이미지 선택됨: ${files.map(f=>f.name).join(', ')}`;
      el.className = 'image-count ok';
    } else {
      el.textContent = '';
    }
  });

  function getSelectedFiles() {
    const input = document.getElementById('fileInput');
    return [...(input?.files || [])]
      .filter(f => /\.(jpg|jpeg|png|gif|bmp)$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
  }

  async function generate() {
    const pw = document.getElementById('password').value;
    const titleEl = document.getElementById('title');
    const title = titleEl.value.trim() || titleEl.placeholder;
    const pattern = document.getElementById('pattern').value.trim() || '2';
    const result = document.getElementById('result');
    const btn = document.getElementById('generateBtn');

    let imageFiles = []; // { name, file() }

    if (hasDirectoryPicker) {
      if (!folderHandle) { alert('이미지 폴더를 선택해주세요.'); return; }
      const perm = await folderHandle.requestPermission({ mode: 'read' });
      if (perm !== 'granted') { alert('폴더 접근 권한이 필요합니다.'); return; }
      const images = await getNumberedImages(folderHandle);
      if (!images.length) { alert('이미지 파일이 없습니다.'); return; }
      imageFiles = images.map(i => ({ name: i.name, getFile: () => i.handle.getFile() }));
    } else {
      const files = getSelectedFiles();
      if (!files.length) { alert('이미지 파일을 선택해주세요.'); return; }
      imageFiles = files.map(f => ({ name: f.name, getFile: () => Promise.resolve(f) }));
    }

    btn.disabled = true;
    result.style.display = 'none';

    try {
      // 1. presigned URL 발급
      btn.innerHTML = '<span class="spinner"></span>업로드 준비 중...';
      const urlResp = await fetch('upload-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, filenames: imageFiles.map(i => i.name) })
      });
      const urlData = await urlResp.json();
      if (!urlResp.ok) throw new Error(urlData.error || `서버 오류 (${urlResp.status})`);

      // 2. S3 업로드
      const keys = [];
      for (let i = 0; i < imageFiles.length; i++) {
        btn.innerHTML = `<span class="spinner"></span>업로드 중... (${i+1}/${imageFiles.length})`;
        const file = await imageFiles[i].getFile();
        const { url, key } = urlData.uploads[i];
        let r;
        try {
          r = await fetch(url, { method: 'PUT', body: await file.arrayBuffer() });
        } catch(fetchErr) {
          const msg = `업로드 실패 (${imageFiles[i].name}): ${fetchErr.message || 'CORS 오류'}`;
          fetch('log-error', { method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ step: 's3_upload', error: msg }) });
          throw new Error(msg);
        }
        if (!r.ok) {
          const msg = `업로드 실패 (${imageFiles[i].name}): HTTP ${r.status}`;
          fetch('log-error', { method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ step: 's3_upload', error: msg }) });
          throw new Error(msg);
        }
        keys.push(key);
      }

      // 3. PPTX 생성
      btn.innerHTML = '<span class="spinner"></span>PPTX 생성 중...';
      const genResp = await fetch('generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, session_id: urlData.session_id, keys, title, pattern })
      });
      const genData = await genResp.json();
      if (!genResp.ok) throw new Error(genData.error || `생성 오류 (${genResp.status})`);

      result.className = 'result success';
      result.innerHTML = `완료!<br><br><a href="download?key=${encodeURIComponent(genData.download_key)}" download="${genData.title}.pptx">⬇ ${genData.title}.pptx 다운로드</a>`;
    } catch(e) {
      result.className = 'result error';
      result.innerHTML = `❌ ${e.message || '알 수 없는 오류가 발생했습니다.'}`;
    }

    result.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '생성';
  }

  function toggleHelp() {
    const panel = document.getElementById('helpPanel');
    const hint = document.getElementById('helpHint');
    const open = panel.classList.toggle('open');
    hint.textContent = open ? '닫기' : '탭하세요';
  }

  // 저장된 폴더 자동 로드
  loadSavedFolder();
</script>
</body>
</html>
