<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예배 찬양 동기화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1428;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a2040;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #8898cc; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #8898cc; margin-bottom: 6px; }
    input[type="date"], input[type="password"] {
      width: 100%;
      background: #0f1428;
      border: 1px solid #2a3560;
      border-radius: 8px;
      color: #fff;
      padding: 10px 14px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #5080e0; }
    button {
      width: 100%;
      background: #5080e0;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a60c0; }
    button:disabled { background: #2a3560; cursor: not-allowed; }
    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .result.success { background: #1a3020; border: 1px solid #2a6040; }
    .result.error   { background: #301a20; border: 1px solid #602a40; }
    .result a { color: #80b0ff; }
    .songs { margin-top: 10px; color: #8898cc; }
    .songs li { list-style: none; padding: 2px 0; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎵 예배 찬양 동기화</h1>
    <p class="subtitle">Notion 스케쥴 → YouTube 재생목록</p>

    <label>기준 날짜</label>
    <input type="date" id="date">

    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호 입력">

    <button id="syncBtn" onclick="sync()">동기화 시작</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    // 오늘 날짜 기본값
    document.getElementById('date').value = new Date().toISOString().slice(0, 10);

    async function sync() {
      const btn = document.getElementById('syncBtn');
      const result = document.getElementById('result');
      const d = document.getElementById('date').value;
      const pw = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>동기화 중...';
      result.style.display = 'none';

      try {
        const resp = await fetch('sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: d, password: pw })
        });
        const data = await resp.json();

        if (!resp.ok) {
          result.className = 'result error';
          result.innerHTML = `❌ ${data.error}`;
        } else {
          result.className = 'result success';
          let html = `✅ ${data.message}<br>`;
          if (data.playlist_url) {
            html += `<a href="${data.playlist_url}" target="_blank">▶ 재생목록 열기</a><br>`;
          }
          if (data.pages) {
            html += `<ul class="songs">`;
            data.pages.forEach(p => {
              html += `<li>📅 ${p.date} — ${p.title} (${p.count}곡)</li>`;
            });
            html += `</ul>`;
          }
          if (data.total) html += `<br>총 ${data.total}곡`;
          result.innerHTML = html;
        }
      } catch (e) {
        result.className = 'result error';
        result.innerHTML = `❌ 네트워크 오류: ${e.message}`;
      }

      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '동기화 시작';
    }
  </script>
</body>
</html>
